services:
  - type: web
    runtime: static
    name: primecoach-website
    buildCommand: npm run build
    staticPublishPath: ./out
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
